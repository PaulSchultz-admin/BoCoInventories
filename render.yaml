services:
  - type: web
    name: bocoinventories-backend
    env: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    disk:
      name: bocoinventories-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://bocoinventories.org

  - type: web
    name: bocoinventories-frontend
    env: static
    rootDir: frontend26
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://bocoinventories-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
